image:
- Visual Studio 2022
environment:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
build_script:
- appveyor DownloadFile https://dot.net/v1/dotnet-install.ps1
- pwsh: ./dotnet-install.ps1 -JSonFile global.json -Architecture x64 -InstallDir 'C:\Program Files\dotnet'
# 1. Build core: produces Iconistic + Iconistic.Blazor nupkgs in nugets/
- dotnet build src --configuration Release
# 2. Download icon packs (Replicant cached) and pack Iconistic.<Pack> nugets into nugets/
- src\PackBuilder\bin\Release\net10.0\PackBuilder.exe --report-trx --results-directory TestResults --coverage --coverage-output-format cobertura --coverage-output packbuilder.cobertura.xml
# 3. Build the integration tests + sample (consume the freshly-built nugets from the local feed)
- dotnet build IntegrationTests --configuration Release
- dotnet build sample --configuration Release
# 4. Run test suites
- src\Tests\bin\Release\net10.0\Tests.exe --report-trx --results-directory TestResults --coverage --coverage-output-format cobertura --coverage-output unit.cobertura.xml
- IntegrationTests\IntegrationTests\bin\Release\net10.0\IntegrationTests.exe --report-trx --results-directory TestResults --coverage --coverage-output-format cobertura --coverage-output integration.cobertura.xml
- IntegrationTests\DiskModeConsumer\bin\Release\net10.0\DiskModeConsumer.exe --report-trx --results-directory TestResults --coverage --coverage-output-format cobertura --coverage-output disk.cobertura.xml
- pwsh: sample\Iconistic.Web.Tests\bin\Release\net10.0\playwright.ps1 install chromium
- dotnet test sample\Iconistic.Web.Tests --configuration Release --no-build --results-directory TestResults --logger trx
on_finish:
- ps: |
    Get-ChildItem TestResults\*.trx -ErrorAction SilentlyContinue | % {
      (New-Object 'System.Net.WebClient').UploadFile("https://ci.appveyor.com/api/testresults/mstest/$($env:APPVEYOR_JOB_ID)", $_.FullName)
    }
    Get-ChildItem TestResults\*.cobertura.xml -ErrorAction SilentlyContinue | % { Push-AppveyorArtifact $_.FullName -FileName $_.Name }
on_failure:
- ps: |
    $root = (Get-Location).Path
    Get-ChildItem *.received.* -Recurse | % {
      $rel = $_.FullName.Substring($root.Length + 1)
      Push-AppveyorArtifact $_.FullName -FileName $rel
    }
test: off
artifacts:
- path: nugets\*.nupkg
- path: TestResults\*.cobertura.xml
