<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IconifyBundle</title>
    <base href="/" />
    <style>
        :root { color-scheme: light dark; }
        body {
            font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
            margin: 0;
            padding: 2rem;
            color: #1b1f24;
            background: #fff;
        }
        header h1 { margin: 0 0 .25rem; }
        header p { margin: 0 0 1.5rem; color: #57606a; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(96px, 1fr));
            gap: .75rem;
        }
        .cell {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: .5rem;
            margin: 0;
            padding: 1rem .5rem;
            border: 1px solid #d0d7de;
            border-radius: 8px;
            color: #0969da;
        }
        .cell svg { display: block; }
        figcaption { font-size: .75rem; color: #57606a; }
        @media (prefers-color-scheme: dark) {
            body { color: #e6edf3; background: #0d1117; }
            .cell { border-color: #30363d; color: #58a6ff; }
            header p, figcaption { color: #8b949e; }
        }
    </style>
</head>

<body>
    <div id="app">Loading…</div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
